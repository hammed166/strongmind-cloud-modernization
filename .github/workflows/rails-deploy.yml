# =============================
# Rails Deploy Workflow (ECS)
# =============================
#
# Usage & Production Readiness Checklist
# --------------------------------------
#
# - CI runs on all branches: installs dependencies, runs RSpec, Brakeman, builds and pushes Docker image to ECR.
# - Deploys on push to main or manual dispatch. Supports dev, uat, prod environments (default: dev).
# - Only prod deployments require manual approval (set up in GitHub UI under Environments > prod).
# - Uses OIDC for AWS authentication (no static keys required).
# - Automated rollback if ECS service fails to stabilize.
# - Concurrency control prevents overlapping deploys to the same environment.
# - All secrets are handled via GitHub/AWS secrets, nothing hardcoded.
# - To add notifications, extend the deploy job with your preferred integration (Slack, Teams, etc).
# - Ensure your ECS task definition and ECR repo are production-ready (resource limits, health checks, etc).

name: Rails Deploy

on:
  push:
    branches:
      - main
      - '**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: false
        default: 'dev'
        type: choice
        options:
          - dev
          - uat
          - prod

# Prevent concurrent deploys to the same environment
env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
  AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
  ECS_CLUSTER: strongmind-production
  ECS_SERVICE: rails-app
  ECS_TASK_FAMILY: rails-app

concurrency:
  group: rails-deploy-${{ github.ref }}-${{ github.event.inputs.environment || 'production' }}
  cancel-in-progress: false

jobs:
  # =============================
  # CI: Test, Lint, Build, Scan
  # =============================
  ci:
    name: CI (Test & Build)
    runs-on: ubuntu-latest
    if: github.event_name != 'push' || github.ref != 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      # Ruby setup
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.3

      # Bundle caching for faster builds
      - name: Cache bundle
        uses: actions/cache@v4
        with:
          path: vendor/bundle
          key: ${{ runner.os }}-gems-${{ hashFiles('**/Gemfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-gems-

      # Install dependencies
      - name: Install dependencies
        run: |
          bundle config set path 'vendor/bundle'
          bundle install --jobs 4 --retry 3

      # Run tests
      - name: Run RSpec tests
        run: bundle exec rspec

      # Security scan
      - name: Run Brakeman security scan
        run: bundle exec brakeman --no-exit-on-warn

      # Docker multi-platform build setup
      - name: Set up QEMU for multi-platform builds
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ECR login
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # Build and push Docker image
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.ECR_REPOSITORY }}:${{ github.sha }}
            ${{ env.ECR_REPOSITORY }}:latest
          platforms: linux/amd64,linux/arm64

  # =============================
  # Deploy: ECS Fargate & Rollback
  # =============================
  deploy:
    name: Deploy to ECS
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    environment:
      name: ${{ github.event.inputs.environment || 'dev' }}
      url: https://rails-app.strongmind.com
    # For prod, require manual approval via GitHub protected environments
    # (Set up 'prod' environment protection rules in GitHub UI for reviewers/approvals)
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      # AWS OIDC authentication
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # ECR login
      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      # Build and push Docker image (repeat for deploy context)
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.ECR_REPOSITORY }}:${{ github.sha }}
            ${{ env.ECR_REPOSITORY }}:latest
          platforms: linux/amd64,linux/arm64

      # Render ECS task definition with new image
      - name: Update ECS task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: .github/workflows/ecs-task-definition.json
          container-name: rails-app
          image: ${{ env.ECR_REPOSITORY }}:${{ github.sha }}

      # Deploy to ECS service
      - name: Deploy to ECS service
        id: deploy-ecs
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
          force-new-deployment: true

      # Automated rollback on failure
      - name: Rollback on failure
        if: failure()
        run: |
          echo "Deployment failed. Rolling back to previous task definition."
          aws ecs update-service --cluster $ECS_CLUSTER --service $ECS_SERVICE --task-definition $ECS_TASK_FAMILY:$(aws ecs describe-services --cluster $ECS_CLUSTER --services $ECS_SERVICE --query 'services[0].deployments[1].taskDefinition' --output text | awk -F: '{print $2}')

      # Notify on failure
      - name: Notify on failure
        if: failure()
        run: |
          echo "Deployment failed and rollback triggered. Please investigate."
